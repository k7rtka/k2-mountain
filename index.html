<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивная гора К2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="canvas-container"></div>

  <div id="marker-camp" class="marker" data-place="camp">1</div>
  <div id="marker-bottleneck" class="marker" data-place="bottleneck">2</div>
  <div id="marker-summit" class="marker" data-place="summit">3</div>

  <div id="info-card" class="info-card">
    <button id="close-card">&times;</button>
    <h3 id="card-title">Название точки</h3>
    <p id="card-text">Описание...</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
